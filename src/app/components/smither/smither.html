<div class="w-full h-full flex flex-col bg-cover bg-center bg-black bg-no-repeat relative">
  <img src="imgs/smither/smither_0.webp" class="w-full h-full object-cover" alt="" />

  <app-item-info-card></app-item-info-card>

  <div class="absolute w-[268px] h-[260px] top-[128px] left-[375px]">
    <app-animation-object
      [Name]="'smither-merchant'"
      [Duration]="2200"
      [spritePaths]="greetAnimationPaths"
    ></app-animation-object>
  </div>

  @if (currentShopItems() && currentShopItems().length >= 5) {
    @if (!currentShopItems()[0].isSold) {
      <app-shop-item
        [devmode]="true"
        [x]="213"
        [y]="340"
        [itemObject]="currentShopItems()[0]"
        (click)="gameStateService.shop.selectItemForPreview('weapon', 0)"
      ></app-shop-item>
    }

    @if (!currentShopItems()[1].isSold) {
      <app-shop-item
        [devmode]="true"
        [x]="395"
        [y]="340"
        [itemObject]="currentShopItems()[1]"
        (click)="gameStateService.shop.selectItemForPreview('weapon', 1)"
      ></app-shop-item>
    }

    @if (!currentShopItems()[2].isSold) {
      <app-shop-item
        [devmode]="true"
        [x]="595"
        [y]="340"
        [itemObject]="currentShopItems()[2]"
        (click)="gameStateService.shop.selectItemForPreview('weapon', 2)"
      ></app-shop-item>
    }

    @if (!currentShopItems()[3].isSold) {
      <app-shop-item
        [devmode]="true"
        [x]="803"
        [y]="340"
        [itemObject]="currentShopItems()[3]"
        (click)="gameStateService.shop.selectItemForPreview('weapon', 3)"
      ></app-shop-item>
    }

    @if (!currentShopItems()[4].isSold) {
      <app-shop-item
        [devmode]="true"
        [x]="989"
        [y]="340"
        [itemObject]="currentShopItems()[4]"
        (click)="gameStateService.shop.selectItemForPreview('weapon', 4)"
      ></app-shop-item>
    }
  } @else {
    <div
      class="text-white absolute inset-0 flex items-center justify-center bg-black bg-opacity-70"
    >
      Lade Schmiedewaren...
    </div>
  }
</div>
