<div
  class="w-100 h-100 flex flex-col items-center justify-center min-h-full bg-gray-900 text-white relative fromat-normal"
>
  <!-- Background -->
  <div class="absolute inset-0">
    <img
      class="object-cover w-full h-full"
      src="imgs/inventar/inventar.webp"
      alt="Name Creation Background"
    />
  </div>

  <!-- Name creation card -->
  <div class="absolute inset-0 flex items-center justify-center">
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-full max-w-[26rem] flex flex-col items-center justify-center gap-6">
        <span class="heading-grim text-lg font-bold text-grim-parchment">Name ändern</span>
        <input
          type="text"
          id="characterName"
          [(ngModel)]="name"
          (keyup.enter)="onConfirm()"
          class="w-full px-4 py-2 bg-black/50 border border-grim-border rounded-md text-grim-parchment focus:outline-none focus:ring-2 focus:ring-grim-gold"
          placeholder="Charaktername"
        />
        @if (error) {
          <span class="text-red-400 text-sm -mt-4">{{ error }}</span>
        }

        <div class="grid grid-cols-2 gap-4">
          @for (avatar of avatars; track avatar.id) {
            <button
              type="button"
              (click)="selectAvatar(avatar.id)"
              class="w-[9rem] h-[11rem] rounded-md overflow-hidden border-2 bg-black/40 transition duration-150"
              [class.border-grim-gold]="selectedAvatarId === avatar.id"
              [class.border-grim-border]="selectedAvatarId !== avatar.id"
              [attr.aria-pressed]="selectedAvatarId === avatar.id"
            >
              <img [src]="avatar.portrait" class="w-full h-full object-contain" [alt]="avatar.id" />
            </button>
          }
        </div>

        <button
          (click)="onConfirm()"
          class="btn-grim btn-grim-primary w-full py-2 px-4"
        >
          Bestätigen
        </button>
      </div>
    </div>
  </div>
</div>
