<div
  class="w-100 h-100 flex flex-col items-center justify-center min-h-full bg-gray-900 text-white relative fromat-normal"
>
  <!-- Background -->
  <div class="absolute inset-0">
    <img
      class="object-cover w-full h-full"
      src="imgs/login/login-bg.webp"
      alt="Name Creation Background"
    />
  </div>

  <!-- Name creation card -->
  <div class="absolute inset-0 flex items-center justify-center">
    <img class="w-[80%] h-[80%]" src="imgs/login/login-card.webp" alt="Name creation card" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-full max-w-[16rem] mt-[-12.5rem] flex flex-col items-center justify-center gap-6">
        <span class="text-lg font-bold">Wähle deinen Namen</span>
        <input
          type="text"
          id="characterName"
          [(ngModel)]="name"
          (keyup.enter)="onConfirm()"
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Charaktername"
        />
        @if (error) {
          <span class="text-red-400 text-sm -mt-4">{{ error }}</span>
        }
        <button
          (click)="onConfirm()"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-md transition duration-200"
        >
          Bestätigen
        </button>
      </div>
    </div>
  </div>
</div>
