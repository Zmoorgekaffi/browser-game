<section class="w-full h-full relative bg-black">

  ></app-armor-slot>

  <app-armor-slot
    [slotName]="'accessoires-left'"
    [x]="200"
    [y]="109"

  <app-armor-slot

  ></app-armor-slot>

  <app-armor-slot

    [x]="364"

  ></app-armor-slot>

  <div

    class="absolute top-4 right-4 cursor-pointer bg-red-600 hover:bg-red-700 text-white font-bold px-4 py-2 rounded-md z-50 select-none"
  >
    Schließen ✕
  </div>

  <div
    class="absolute overflow-y-auto z-10 min-w-[509px] max-w-[509px] min-h-[464px] max-h-[464px] top-[185px] left-[678px] p-4 flex flex-col items-start justify-start gap-2"
  >
    @for (item of inventar()?.items; track $index) {
      <app-inventar-item [item]="item" [index]="$index"></app-inventar-item>
    } @empty {
      <div class="text-white text-center w-full mt-4 opacity-50">Dein Inventar ist leer.</div>
    }
  </div>
