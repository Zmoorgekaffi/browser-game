@if (currentCharId() != null) {
  <header class="w-full h-[3rem] bg-[orange] rounded-[8px] flex justify-between items-center px-4">
    <div>Rubine: {{ rubies() }} | Gold: {{ gold() }}</div>

    <div>
      <span class="hover:underline cursor-pointer" routerLink="/character">Charakter</span>
      <span> | </span>
      <span class="hover:underline cursor-pointer" routerLink="/inventar">Inventar</span>
    </div>

    <div>Name: {{ name() }} | Level: {{ lvl() }}</div>

}
