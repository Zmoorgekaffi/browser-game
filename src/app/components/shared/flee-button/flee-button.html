@if (inAdventure() && !resolveChallengeActive()) {
  <div class="absolute top-4 right-4 z-50 flex flex-col items-end gap-2">
    @if (!confirming()) {
      <button
        class="px-4 py-2 bg-red-800/90 hover:bg-red-700 text-white text-sm font-semibold rounded-lg shadow-md"
        (click)="requestFlee()"
      >
        Fliehen
      </button>
    } @else {
      <div class="bg-black/85 border border-white/20 rounded-lg p-3 flex flex-col gap-2 items-center max-w-[260px] text-center">
        <p class="text-sm text-zinc-100">
          Wirklich fliehen? Du verlierst Beute &amp; Gold aus diesem Lauf. Deine EXP bleibt erhalten.
        </p>
        <div class="flex gap-2">
          <button
            class="px-4 py-1.5 bg-red-700 hover:bg-red-600 text-white text-sm font-semibold rounded-md"
            (click)="confirmFlee()"
          >
            Ja, fliehen
          </button>
          <button
            class="px-4 py-1.5 bg-zinc-600 hover:bg-zinc-500 text-white text-sm font-semibold rounded-md"
            (click)="cancelFlee()"
          >
            Abbrechen
          </button>
        </div>
      </div>
    }
  </div>
}
