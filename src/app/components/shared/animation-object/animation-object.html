<div 
  class="animation-container" 
  [style.width]="width" 
  [style.height]="height"
>
  @if (currentSpritePath()) {
    <img 
      [src]="currentSpritePath()" 
      [alt]="Name" 
      class="pixel-sprite w-full h-full"
      [class.object-contain]="contain"
      [class.object-cover]="!contain"
    />
  } @else {
    <div class="animation-placeholder"></div>
  }
</div>
