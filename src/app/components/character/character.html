<div
  class="w-full h-full flex flex-col bg-cover bg-center bg-black bg-no-repeat relative select-none"
>
  <div class="absolute top-[78px] left-[735px] w-[395px] h-[59px]">
    <span
      class="pb-[3px] w-full h-full flex justify-center items-center text-[40px] leading-[48px] text-white font-bold tracking-wide"
    >
      Werte
    </span>
  </div>

  <div
    #statList
    class="absolute top-[175px] left-[667px] w-[533px] h-[485px] p-5 flex flex-col justify-start gap-1 items-center overflow-y-auto bg-black/40 border border-white/10 rounded-lg backdrop-blur-sm"
  >
    <div
      class="w-full flex justify-between items-center text-white text-xs uppercase border-b pb-2 font-semibold"
    >
      <span class="w-[45%] text-left">Attribut</span>
      <span class="w-[25%] text-center">Gesamt</span>
      <span class="w-[30%] text-right">Basis</span>
    </div>

    @for (stat of displayStats; track stat.key) {
      <div
        class="w-full flex justify-between items-center py-1.5 text-[16px] border-b border-white/5 hover:bg-white/5 transition-colors duration-150"
      >
        <span class="w-[45%] text-left text-gray-200 font-medium">
          {{ stat.name }}
        </span>

        <span class="w-[25%] text-center text-green-400 font-bold">
          {{ combatStats()[stat.key] !== undefined ? combatStats()[stat.key] : 0 }}
        </span>

        <span class="w-[30%] text-right text-[rgba(255,255,255,0.8)] text-sm font-mono">
          {{ baseStats()[stat.key] !== undefined ? baseStats()[stat.key] : 0 }}
        </span>
      </div>
    }
  </div>

  <!-- bg -->
  <img
    src="imgs/character/character_0.webp"
    class="w-full h-full object-cover"
    alt="Character Render"
  />

  <div
    class="border-2 bg-[#EDE2D1] border-blue-600 w-[338px] h-[370px] absolute top-[164px] left-[175px]"
  >
    <app-animation-object
      [spritePaths]="characterLookAraoundAnimation"
      [Duration]="4000"
      Name="Character Look Around Animation"
      delay="7000"
    ></app-animation-object>
  </div>

  <!-- skills -->
  <div class="absolute" routerLink="/skills">Skills</div>
</div>
