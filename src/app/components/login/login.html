<div
  class="w-100 h-100 flex flex-col items-center justify-center min-h-full bg-gray-900 text-white relative fromat-normal"
>
  <!-- Background -->
  <div class="absolute inset-0">
    <img
      class="object-cover w-full h-full"
      src="imgs/login/login-bg.webp"
      alt="Login Background"
    />
  </div>

  <!-- Login card -->
  <div class="absolute inset-0 flex items-center justify-center">
    <img class="w-[auto] h-[80px] mt-[-266px]" src="imgs/shared/input/input_0.webp" alt="Login card" />
    <div class="absolute inset-0 flex items-center justify-center">
      <div class="w-full max-w-[415px] mt-[-12.5rem] flex flex-col items-center justify-center gap-6">
          <input
            type="text"
            id="characterId"
            [(ngModel)]="characterId"
            class="w-full px-4 py-2 text-center bg-transparent"
            placeholder="Enter your character ID"
          />
        <button
          (click)="onLogin()"
          class="w-full bg-[rgba(255,255,255,0.3)] hover:bg-[#c9a34d] text-white font-bold py-2 px-4 rounded-md transition duration-200"
        >
          Login
        </button>
      </div>
    </div>
  </div>
</div>
